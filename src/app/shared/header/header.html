@if (branding.value(); as empresa) {
  <header class="cab" [style.border-bottom-color]="empresa.colorPrimario">
    <img class="cab-logo" [src]="empresa.logoUrl" [alt]="empresa.nombre" />
    <app-selector-idioma />
  </header>
} @else if (branding.isLoading()) {
  <header class="cab">
    <div class="cab-logo-skeleton shimmer"></div>
    <app-selector-idioma />
  </header>
}
