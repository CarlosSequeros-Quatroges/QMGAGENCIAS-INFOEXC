@if (branding.value(); as empresa) {
  <header class="cab">
    <img class="cab-logo" src="fuerte-itaka-logo.png" [alt]="empresa.nombre" />
    <app-selector-idioma />
  </header>
} @else if (branding.isLoading()) {
  <header class="cab">
    <div class="cab-logo-skeleton shimmer"></div>
    <app-selector-idioma />
  </header>
}
